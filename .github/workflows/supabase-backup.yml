# SUPABASE_DB_URL = Supabase → Settings → Database → Connection Pooling → Session mode → URI
# Add this secret: GitHub repo → Settings → Secrets → Actions → New secret

name: "Daily DB backup / สำรองข้อมูล"

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      PGSSLMODE: require
    steps:
      - name: Install postgresql-client-17
        run: |
          sudo apt-get install -y curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Verify pg_dump version
        run: /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Run pg_dump
        run: |
          /usr/lib/postgresql/17/bin/pg_dump "$DB_URL" \
            --no-owner --no-acl --format=plain \
            --file=backup-$(date +%Y-%m-%d).sql

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.sql
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: echo "BACKUP FAILED on $(date)" && exit 1
